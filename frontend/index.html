    <!-- Защита от конфликтов криптокошельков -->
    <script>
      // Блокируем множественную инициализацию TronWeb
      (function() {
        // Перехватываем console ПЕРЕД загрузкой скриптов расширений
        const originalConsoleWarn = console.warn;
        const originalConsoleError = console.error;
        const originalConsoleLog = console.log;

        console.warn = function(...args) {
          const msg = String(args[0] || '');

          // Игнорируем расширения криптокошельков
          if (msg.includes('TronWeb') ||
              msg.includes('TronLink') ||
              msg.includes('already initiated') ||
              msg.includes('Backpack') ||
              msg.includes("couldn't override")) {
            return;
          }

          // Игнорируем Stripe dev warnings
          if (msg.includes('Stripe.js integration over HTTP') ||
              msg.includes('live Stripe.js integrations must use HTTPS')) {
            return;
          }

          // Игнорируем AudioContext warnings (нормальное поведение браузера)
          if (msg.includes('AudioContext') ||
              msg.includes('user gesture') ||
              msg.includes('autoplay')) {
            return;
          }

          originalConsoleWarn.apply(console, args);
        };

        console.error = function(...args) {
          const msg = String(args[0] || '');
          const str = JSON.stringify(args);

          // Игнорируем ошибки расширений криптокошельков
          if (msg.includes('TronWeb') ||
              msg.includes('bybit:page provider') ||
              msg.includes('Namada') ||
              msg.includes('message port closed') ||
              msg.includes('Backpack') ||
              msg.includes("couldn't override") ||
              msg.includes('window.ethereum')) {
            return;
          }

          // Игнорируем Stripe origin errors от расширений
          if (msg.includes("origins don't match") ||
              msg.includes('stripe.com') ||
              msg.includes('stripe.network') ||
              msg.includes('Failed to load Stripe') ||
              msg.includes('ERR_NETWORK_CHANGED')) {
            return;
          }

          // Игнорируем React DevTools errors
          if (msg.includes('Invalid argument not valid semver') ||
              msg.includes('react_devtools') ||
              str.includes('react_devtools')) {
            return;
          }

          // Игнорируем JSX attribute warnings
          if (msg.includes('non-boolean attribute') ||
              msg.includes('Received `true` for a non-boolean')) {
            return;
          }

          originalConsoleError.apply(console, args);
        };

        console.log = function(...args) {
          const msg = String(args[0] || '');

          // Игнорируем логи расширений
          if (msg.includes('bybit:page provider') ||
              msg.includes('Listening on port') ||
              msg.includes('[INFO]')) {
            return;
          }

          // Игнорируем Tone.js startup messages
          if (msg.includes('Tone.js v') ||
              msg.includes('* Tone.js')) {
            return;
          }

          originalConsoleLog.apply(console, args);
        };

        // Защищаем window от переопределения (только getters/setters)
        try {
          Object.defineProperty(window, 'tronWeb', {
            configurable: false,
            set: function(value) {
              if (!this._tronWebSet) {
                this._tronWebValue = value;
                this._tronWebSet = true;
              }
            },
            get: function() {
              return this._tronWebValue;
            }
          });
        } catch (e) {
          // Уже определено, игнорируем
        }

        // Предотвращаем переопределение ethereum
        try {
          Object.defineProperty(window, 'ethereum', {
            configurable: false,
            set: function(value) {
              if (!this._ethereumSet) {
                this._ethereumValue = value;
                this._ethereumSet = true;
              }
            },
            get: function() {
              return this._ethereumValue;
            }
          });
        } catch (e) {
          // Уже определено, игнорируем
        }
      })();
    </script>
    
    <!-- Feature Detection & Polyfills -->
