[build]
  command = "npm run build"
  publish = "dist"

# Proxy API запросов к бэкенду (ПЕРЕД SPA fallback!)
[[redirects]]
  from = "/api/*"
  to = "https://haorivision-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — все остальные роуты через index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Заголовки безопасности
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Кэширование статики
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/artist/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
