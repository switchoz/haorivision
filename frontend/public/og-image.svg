  <line x1="480" y1="430" x2="720" y2="430" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <text x="600" y="480" text-anchor="middle" font-size="18" font-family="system-ui, sans-serif" fill="#71717a">Носимое световое искусство · Ручная роспись UV-красками</text>
  <text x="600" y="560" text-anchor="middle" font-size="14" font-family="system-ui, sans-serif" fill="#52525b" letter-spacing="4">HAORIVISION.COM</text>
