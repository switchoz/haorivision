<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAORI VISION — RMA Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 30px 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(168, 85, 247, 0.3);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 8px;
        }

        .stat-card .label {
            font-size: 14px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filters {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: #a855f7;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
        }

        .rma-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .rma-card {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
        }

        .rma-card:hover {
            border-color: #a855f7;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
        }

        .rma-card.overdue {
            border-color: #ef4444;
        }

        .rma-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .rma-id {
            font-size: 18px;
            font-weight: 600;
            color: #a855f7;
        }

        .rma-status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-requested { background: #fbbf24; color: #000; }
        .status-approved { background: #3b82f6; color: #fff; }
        .status-in_transit { background: #8b5cf6; color: #fff; }
        .status-inspected { background: #6366f1; color: #fff; }
        .status-refunded { background: #10b981; color: #fff; }
        .status-declined { background: #ef4444; color: #fff; }

        .rma-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .rma-info-item {
            font-size: 14px;
        }

        .rma-info-item .label {
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .rma-info-item .value {
            color: #fff;
            font-weight: 500;
        }

        .rma-reason {
            background: rgba(168, 85, 247, 0.1);
            border-left: 3px solid #a855f7;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .rma-reason .label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .rma-reason .text {
            font-size: 14px;
            color: #fff;
        }

        .rma-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: #10b981;
            color: #fff;
        }

        .btn-approve:hover {
            background: #059669;
        }

        .btn-decline {
            background: #ef4444;
            color: #fff;
        }

        .btn-decline:hover {
            background: #dc2626;
        }

        .btn-inspect {
            background: #6366f1;
            color: #fff;
        }

        .btn-inspect:hover {
            background: #4f46e5;
        }

        .btn-refund {
            background: #a855f7;
            color: #fff;
        }

        .btn-refund:hover {
            background: #9333ea;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .timeline {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
        }

        .timeline-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a855f7;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-label {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .timeline-timestamp {
            font-size: 12px;
            color: #9ca3af;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #a855f7;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RMA Admin — Returns Management</h1>
            <p>Manage customer returns and refunds</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="value" id="stat-total">0</div>
                <div class="label">Total RMAs</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-requested">0</div>
                <div class="label">Requested</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-approved">0</div>
                <div class="label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-refunded">0</div>
                <div class="label">Refunded</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-status="all">All</button>
            <button class="filter-btn" data-status="requested">Requested</button>
            <button class="filter-btn" data-status="approved">Approved</button>
            <button class="filter-btn" data-status="in_transit">In Transit</button>
            <button class="filter-btn" data-status="inspected">Inspected</button>
            <button class="filter-btn" data-status="refunded">Refunded</button>
            <button class="filter-btn" data-status="declined">Declined</button>
        </div>

        <div class="rma-list" id="rmaList">
            <!-- RMAs will be loaded here -->
        </div>
    </div>

    <!-- Decline Modal -->
    <div class="modal" id="declineModal">
        <div class="modal-content">
            <div class="modal-header">Decline Return</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Reason</label>
                    <select id="declineReason">
                        <option value="past_return_window">Past return window (>14 days)</option>
                        <option value="damaged_by_customer">Damaged by customer</option>
                        <option value="not_eligible">Not eligible for return</option>
                        <option value="policy_violation">Policy violation</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Details (optional)</label>
                    <textarea id="declineDetails" placeholder="Explain reason for decline..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeDeclineModal()">Cancel</button>
                <button class="btn btn-decline" onclick="confirmDecline()">Decline RMA</button>
            </div>
        </div>
    </div>

    <!-- Inspect Modal -->
    <div class="modal" id="inspectModal">
        <div class="modal-content">
            <div class="modal-header">Inspect Returned Item</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Condition</label>
                    <select id="inspectCondition">
                        <option value="excellent">Excellent — Like new</option>
                        <option value="good">Good — Minor wear</option>
                        <option value="damaged">Damaged — Customer damage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Inspection Notes</label>
                    <textarea id="inspectNotes" placeholder="Describe condition, packaging, etc..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeInspectModal()">Cancel</button>
                <button class="btn btn-inspect" onclick="confirmInspect()">Complete Inspection</button>
            </div>
        </div>
    </div>

    <!-- Refund Modal -->
    <div class="modal" id="refundModal">
        <div class="modal-content">
            <div class="modal-header">Issue Refund</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Refund Amount (EUR)</label>
                    <input type="number" id="refundAmount" placeholder="450.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Refund Method</label>
                    <select id="refundMethod">
                        <option value="original">Original payment method</option>
                        <option value="store_credit">Store credit</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeRefundModal()">Cancel</button>
                <button class="btn btn-refund" onclick="confirmRefund()">Issue Refund</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Mock RMA data (replace with API calls in production)
        const mockRMAs = [
            {
                id: 'RMA-000001',
                orderId: 'order_12345',
                userId: 'user_001',
                productSku: 'TEST-001',
                status: 'requested',
                reason: 'Size doesn\'t fit',
                requestedAt: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString(),
                refundAmount: 450.00,
                notes: [],
                metadata: {}
            },
            {
                id: 'RMA-000002',
                orderId: 'order_12346',
                userId: 'user_002',
                productSku: 'ECLIPSE-01',
                status: 'approved',
                reason: 'Changed mind',
                requestedAt: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
                approvedAt: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString(),
                refundAmount: 520.00,
                notes: ['Return approved by admin'],
                metadata: {}
            },
            {
                id: 'RMA-000003',
                orderId: 'order_12347',
                userId: 'user_003',
                productSku: 'LUMIN-01',
                status: 'refunded',
                reason: 'Defective product',
                requestedAt: new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString(),
                approvedAt: new Date(Date.now() - 4 * 24 * 60 * 60 * 1000).toISOString(),
                inspectedAt: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString(),
                refundedAt: new Date().toISOString(),
                refundAmount: 480.00,
                refundMethod: 'original',
                notes: ['Item inspected. Condition: excellent.', 'Refund issued: €480.00 via original'],
                metadata: {}
            }
        ];

        let rmas = [...mockRMAs];
        let currentFilter = 'all';
        let currentRMAId = null;

        function updateStats() {
            const stats = {
                total: rmas.length,
                requested: rmas.filter(r => r.status === 'requested').length,
                approved: rmas.filter(r => r.status === 'approved').length,
                refunded: rmas.filter(r => r.status === 'refunded').length
            };

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-requested').textContent = stats.requested;
            document.getElementById('stat-approved').textContent = stats.approved;
            document.getElementById('stat-refunded').textContent = stats.refunded;
        }

        function renderRMAs() {
            const list = document.getElementById('rmaList');
            const filtered = currentFilter === 'all'
                ? rmas
                : rmas.filter(r => r.status === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                        </svg>
                        <p>No RMAs found</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(rma => {
                const daysSince = Math.floor((Date.now() - new Date(rma.requestedAt).getTime()) / (1000 * 60 * 60 * 24));
                const isOverdue = !['refunded', 'declined'].includes(rma.status) && daysSince > 3;

                return `
                    <div class="rma-card ${isOverdue ? 'overdue' : ''}" data-rma-id="${rma.id}">
                        <div class="rma-header">
                            <div class="rma-id">${rma.id}</div>
                            <div class="rma-status status-${rma.status}">${rma.status.replace('_', ' ')}</div>
                        </div>

                        <div class="rma-info">
                            <div class="rma-info-item">
                                <div class="label">Order ID</div>
                                <div class="value">${rma.orderId}</div>
                            </div>
                            <div class="rma-info-item">
                                <div class="label">Product</div>
                                <div class="value">${rma.productSku}</div>
                            </div>
                            <div class="rma-info-item">
                                <div class="label">Requested</div>
                                <div class="value">${daysSince} days ago</div>
                            </div>
                            <div class="rma-info-item">
                                <div class="label">Refund Amount</div>
                                <div class="value">€${rma.refundAmount.toFixed(2)}</div>
                            </div>
                        </div>

                        <div class="rma-reason">
                            <div class="label">Reason</div>
                            <div class="text">${rma.reason}</div>
                        </div>

                        ${renderActions(rma)}
                        ${renderTimeline(rma)}
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function renderActions(rma) {
            const actions = [];

            if (rma.status === 'requested') {
                actions.push(`<button class="btn btn-approve" onclick="approveRMA('${rma.id}')">Approve</button>`);
                actions.push(`<button class="btn btn-decline" onclick="openDeclineModal('${rma.id}')">Decline</button>`);
            }

            if (rma.status === 'approved') {
                actions.push(`<button class="btn btn-secondary" onclick="alert('Customer should ship item back')">Awaiting Return</button>`);
            }

            if (rma.status === 'in_transit' || rma.status === 'approved') {
                actions.push(`<button class="btn btn-inspect" onclick="openInspectModal('${rma.id}')">Mark Inspected</button>`);
            }

            if (rma.status === 'inspected') {
                actions.push(`<button class="btn btn-refund" onclick="openRefundModal('${rma.id}')">Issue Refund</button>`);
            }

            if (actions.length === 0) {
                return '';
            }

            return `<div class="rma-actions">${actions.join('')}</div>`;
        }

        function renderTimeline(rma) {
            const timeline = [];

            if (rma.requestedAt) {
                timeline.push({
                    label: 'Return requested',
                    timestamp: rma.requestedAt
                });
            }

            if (rma.approvedAt) {
                timeline.push({
                    label: 'Return approved',
                    timestamp: rma.approvedAt
                });
            }

            if (rma.inspectedAt) {
                timeline.push({
                    label: 'Item inspected',
                    timestamp: rma.inspectedAt
                });
            }

            if (rma.refundedAt) {
                timeline.push({
                    label: `Refunded: €${rma.refundAmount}`,
                    timestamp: rma.refundedAt
                });
            }

            if (timeline.length === 0) return '';

            return `
                <div class="timeline">
                    ${timeline.map(item => `
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <div class="timeline-content">
                                <div class="timeline-label">${item.label}</div>
                                <div class="timeline-timestamp">${new Date(item.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                renderRMAs();
            });
        });

        // Actions
        window.approveRMA = (rmaId) => {
            const rma = rmas.find(r => r.id === rmaId);
            if (rma) {
                rma.status = 'approved';
                rma.approvedAt = new Date().toISOString();
                rma.notes.push(`[${new Date().toISOString()}] RMA approved by admin`);
                renderRMAs();
            }
        };

        window.openDeclineModal = (rmaId) => {
            currentRMAId = rmaId;
            document.getElementById('declineModal').classList.add('active');
        };

        window.closeDeclineModal = () => {
            document.getElementById('declineModal').classList.remove('active');
            currentRMAId = null;
        };

        window.confirmDecline = () => {
            const reason = document.getElementById('declineReason').value;
            const details = document.getElementById('declineDetails').value;

            const rma = rmas.find(r => r.id === currentRMAId);
            if (rma) {
                rma.status = 'declined';
                rma.declinedAt = new Date().toISOString();
                rma.declineReason = reason;
                rma.declineDetails = details;
                rma.notes.push(`[${new Date().toISOString()}] RMA declined: ${reason}`);
                renderRMAs();
            }

            closeDeclineModal();
        };

        window.openInspectModal = (rmaId) => {
            currentRMAId = rmaId;
            document.getElementById('inspectModal').classList.add('active');
        };

        window.closeInspectModal = () => {
            document.getElementById('inspectModal').classList.remove('active');
            currentRMAId = null;
        };

        window.confirmInspect = () => {
            const condition = document.getElementById('inspectCondition').value;
            const notes = document.getElementById('inspectNotes').value;

            const rma = rmas.find(r => r.id === currentRMAId);
            if (rma) {
                rma.status = 'inspected';
                rma.inspectedAt = new Date().toISOString();
                rma.notes.push(`[${new Date().toISOString()}] Item inspected. Condition: ${condition}. ${notes}`);
                renderRMAs();
            }

            closeInspectModal();
        };

        window.openRefundModal = (rmaId) => {
            currentRMAId = rmaId;
            const rma = rmas.find(r => r.id === rmaId);
            if (rma) {
                document.getElementById('refundAmount').value = rma.refundAmount.toFixed(2);
            }
            document.getElementById('refundModal').classList.add('active');
        };

        window.closeRefundModal = () => {
            document.getElementById('refundModal').classList.remove('active');
            currentRMAId = null;
        };

        window.confirmRefund = () => {
            const amount = parseFloat(document.getElementById('refundAmount').value);
            const method = document.getElementById('refundMethod').value;

            const rma = rmas.find(r => r.id === currentRMAId);
            if (rma) {
                rma.status = 'refunded';
                rma.refundedAt = new Date().toISOString();
                rma.refundAmount = amount;
                rma.refundMethod = method;
                rma.notes.push(`[${new Date().toISOString()}] Refund issued: €${amount} via ${method}`);
                renderRMAs();
            }

            closeRefundModal();
        };

        // Initial render
        renderRMAs();
    </script>
</body>
</html>
