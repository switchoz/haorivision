<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background Version -->
  <rect width="600" height="200" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Light Mark Symbol (Dark version for white bg) -->
  <g id="light-mark" transform="translate(50, 60)">
    <path d="M 30 0 L 45 25 L 15 25 Z" fill="url(#darkGradient)"/>
    <path d="M 30 30 L 50 50 L 30 70 L 10 50 Z" fill="url(#darkGradient)"/>
    <path d="M 0 50 L 8 50 L 10 48 L 8 46 Z" fill="url(#darkGradient)" opacity="0.7"/>
    <path d="M 60 50 L 52 50 L 50 48 L 52 46 Z" fill="url(#darkGradient)" opacity="0.7"/>
    <path d="M 30 75 L 45 100 L 15 100 Z" fill="url(#darkGradient)"/>
  </g>

  <!-- Text (Black on white) -->
  <text x="140" y="90"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="900"
        letter-spacing="3"
        fill="#000000">HAORI VISION</text>

  <text x="140" y="120"
        font-family="Georgia, serif"
        font-size="16"
        font-weight="400"
        letter-spacing="6"
        fill="#666666">WEAR THE LIGHT</text>

  <text x="140" y="145"
        font-family="serif"
        font-size="18"
        font-weight="400"
        fill="#1A0033">光を纏う</text>
</svg>
