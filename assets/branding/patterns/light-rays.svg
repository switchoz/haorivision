<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#000000"/>

  <!-- Center point (light source) -->
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#B026FF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>

  <circle cx="400" cy="400" r="50" fill="url(#centerGlow)"/>

  <!-- Radial light rays (24 rays) -->
  <g stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.1">
    <!-- Every 15 degrees -->
    <line x1="400" y1="400" x2="400" y2="0"/>
    <line x1="400" y1="400" x2="503.8" y2="3.8"/>
    <line x1="400" y1="400" x2="600" y2="29.2"/>
    <line x1="400" y1="400" x2="682.8" y2="82.8"/>
    <line x1="400" y1="400" x2="741.4" y2="170.7"/>
    <line x1="400" y1="400" x2="770.8" y2="282.8"/>
    <line x1="400" y1="400" x2="770.8" y2="400"/>
    <line x1="400" y1="400" x2="741.4" y2="517.2"/>
    <line x1="400" y1="400" x2="682.8" y2="629.3"/>
    <line x1="400" y1="400" x2="600" y2="717.2"/>
    <line x1="400" y1="400" x2="503.8" y2="770.8"/>
    <line x1="400" y1="400" x2="400" y2="800"/>
    <line x1="400" y1="400" x2="296.2" y2="796.2"/>
    <line x1="400" y1="400" x2="200" y2="770.8"/>
    <line x1="400" y1="400" x2="117.2" y2="717.2"/>
    <line x1="400" y1="400" x2="58.6" y2="629.3"/>
    <line x1="400" y1="400" x2="29.2" y2="517.2"/>
    <line x1="400" y1="400" x2="29.2" y2="400"/>
    <line x1="400" y1="400" x2="58.6" y2="282.8"/>
    <line x1="400" y1="400" x2="117.2" y2="170.7"/>
    <line x1="400" y1="400" x2="200" y2="82.8"/>
    <line x1="400" y1="400" x2="296.2" y2="29.2"/>
    <line x1="400" y1="400" x2="341.4" y2="3.8"/>
    <line x1="400" y1="400" x2="296.2" y2="3.8"/>
  </g>

  <!-- Thicker accent rays (6 primary rays) -->
  <g stroke="#B026FF" stroke-width="1" fill="none" opacity="0.2">
    <line x1="400" y1="400" x2="400" y2="0"/>
    <line x1="400" y1="400" x2="682.8" y2="117.2"/>
    <line x1="400" y1="400" x2="682.8" y2="682.8"/>
    <line x1="400" y1="400" x2="400" y2="800"/>
    <line x1="400" y1="400" x2="117.2" y2="682.8"/>
    <line x1="400" y1="400" x2="117.2" y2="117.2"/>
  </g>

  <!-- Glow lines (shorter, brighter) -->
  <g stroke="#FF10F0" stroke-width="2" fill="none" opacity="0.3">
    <line x1="400" y1="400" x2="400" y2="200"/>
    <line x1="400" y1="400" x2="541.4" y2="258.6"/>
    <line x1="400" y1="400" x2="600" y2="400"/>
    <line x1="400" y1="400" x2="541.4" y2="541.4"/>
    <line x1="400" y1="400" x2="400" y2="600"/>
    <line x1="400" y1="400" x2="258.6" y2="541.4"/>
    <line x1="400" y1="400" x2="200" y2="400"/>
    <line x1="400" y1="400" x2="258.6" y2="258.6"/>
  </g>

  <!-- Center bright point -->
  <circle cx="400" cy="400" r="5" fill="#FFFFFF" opacity="0.9"/>
</svg>
