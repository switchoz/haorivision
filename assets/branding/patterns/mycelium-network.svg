<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="myceliumPattern" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- Background -->
      <rect width="400" height="400" fill="#000000"/>

      <!-- Mycelium Network Lines - organic, branching -->
      <g stroke="#333333" stroke-width="0.5" fill="none" opacity="0.6">
        <!-- Main trunk 1 -->
        <path d="M 50 200 Q 100 180, 150 200 T 250 220 T 350 200"/>

        <!-- Branch 1a -->
        <path d="M 100 180 Q 110 150, 130 140"/>
        <path d="M 130 140 Q 145 130, 160 135"/>
        <path d="M 130 140 Q 125 120, 135 100"/>

        <!-- Branch 1b -->
        <path d="M 150 200 Q 160 230, 180 250"/>
        <path d="M 180 250 Q 195 270, 210 275"/>

        <!-- Main trunk 2 -->
        <path d="M 80 100 Q 130 110, 180 95 T 280 110 T 370 95"/>

        <!-- Branch 2a -->
        <path d="M 130 110 Q 140 135, 155 145"/>
        <path d="M 155 145 Q 170 155, 185 150"/>

        <!-- Branch 2b -->
        <path d="M 180 95 Q 190 70, 205 55"/>
        <path d="M 205 55 Q 220 40, 235 45"/>

        <!-- Main trunk 3 -->
        <path d="M 60 300 Q 110 285, 160 300 T 260 315 T 360 300"/>

        <!-- Branch 3a -->
        <path d="M 110 285 Q 115 260, 125 245"/>
        <path d="M 125 245 Q 135 230, 150 235"/>

        <!-- Branch 3b -->
        <path d="M 160 300 Q 170 325, 185 340"/>
        <path d="M 185 340 Q 200 355, 215 350"/>

        <!-- Connecting branches (cross-linking) -->
        <path d="M 160 135 Q 165 170, 170 195"/>
        <path d="M 210 275 Q 215 250, 220 230"/>
        <path d="M 150 235 Q 160 210, 165 190"/>

        <!-- Small nodes (connection points) -->
        <circle cx="130" cy="140" r="1.5" fill="#B026FF" opacity="0.3"/>
        <circle cx="155" cy="145" r="1.5" fill="#B026FF" opacity="0.3"/>
        <circle cx="180" cy="250" r="1.5" fill="#B026FF" opacity="0.3"/>
        <circle cx="205" cy="55" r="1.5" fill="#B026FF" opacity="0.3"/>
        <circle cx="125" cy="245" r="1.5" fill="#B026FF" opacity="0.3"/>
        <circle cx="185" cy="340" r="1.5" fill="#B026FF" opacity="0.3"/>
      </g>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="url(#myceliumPattern)"/>
</svg>
