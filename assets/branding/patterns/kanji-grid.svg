<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define the kanji 光 (hikari - light) as a pattern -->
    <g id="hikariKanji">
      <text x="0" y="0"
            font-family="serif"
            font-size="120"
            font-weight="400"
            fill="#0A0A0A"
            opacity="0.05"
            transform="rotate(45)">光</text>
    </g>

    <pattern id="kanjiPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#000000"/>
      <use href="#hikariKanji" x="40" y="120"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="url(#kanjiPattern)"/>
</svg>
